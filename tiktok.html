<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đồ Hay Cho Bro | Chia sẻ sản phẩm thú vị</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="card">
    <a id="productLink" href="#" target="_blank">
        <h1 id="productTitle"></h1>
        <div class="slider" id="slider"></div>
    </a>

    <div class="dots" id="dots"></div>
</div>

<script>
const products = [
    {
        Title: "🔥 Walking Quilt Quần Đùi Hình Con Voi Thiết Kế Dễ",
        link: "https://vt.tiktok.com/ZS9LPBn498VNS-4XL5i/",
        images: [
            "https://p16-oec-sg.ibyteimg.com/tos-alisg-i-aphluv4xwc-sg/6e3422e39ec348d8989b8662afdff120~tplv-aphluv4xwc-crop-webp:750:1000.webp",
            "https://p16-oec-sg.ibyteimg.com/tos-alisg-i-aphluv4xwc-sg/13f362fe553e4ce5a0417c4abc4049c5~tplv-aphluv4xwc-crop-webp:1284:1284.webp",
            "https://p16-oec-sg.ibyteimg.com/tos-alisg-i-aphluv4xwc-sg/91cd71bf7b2f4b2b805e53a34423a872~tplv-aphluv4xwc-crop-webp:720:720.webp"
        ]
    },
    {
        Title: "🔥Mô hình Anime, Elaina, Phù thủy lang thang",
        link: "https://vt.tiktok.com/ZS9LPBTpevhpM-d7KM0/",
        images: [
            "https://p16-oec-va.ibyteimg.com/tos-maliva-i-o3syd03w52-us/8ee4a23bda03424596386996e01e2e9f~tplv-o3syd03w52-crop-webp:1001:1001.webp",
            "https://p16-oec-va.ibyteimg.com/tos-maliva-i-o3syd03w52-us/9b6cb20786364a76a67d548b110b1ea3~tplv-o3syd03w52-crop-webp:1001:1001.webp",
            "https://p16-oec-va.ibyteimg.com/tos-maliva-i-o3syd03w52-us/ccfc2d39916a44319ea2f138d546ee0b~tplv-o3syd03w52-crop-webp:1001:1001.webp"
        ]
    }
];

const randomIndex = Math.floor(Math.random() * products.length);
const product = products[randomIndex];

const productLink = document.getElementById("productLink");
const productTitle = document.getElementById("productTitle");
const slider = document.getElementById("slider");
const dots = document.getElementById("dots");

productLink.href = product.link;
productTitle.innerText = product.Title;
document.title = product.Title + " | Chia sẻ sản phẩm thú vị";

product.images.forEach((src, index) => {
    const img = document.createElement("img");
    img.src = src;
    img.className = "slide" + (index === 0 ? " active" : "");
    img.alt = product.Title + " - ảnh " + (index + 1);
    slider.appendChild(img);

    const dot = document.createElement("span");
    dot.className = "dot" + (index === 0 ? " active" : "");
    dots.appendChild(dot);
});

const slides = document.querySelectorAll(".slide");
const dotItems = document.querySelectorAll(".dot");

let current = 0;

function showSlide(index){
    slides.forEach((slide, i) => {
        slide.classList.toggle("active", i === index);
    });

    dotItems.forEach((dot, i) => {
        dot.classList.toggle("active", i === index);
    });
}

if (slides.length > 1) {
    setInterval(() => {
        current = (current + 1) % slides.length;
        showSlide(current);
    }, 1000);
}
</script>
<style>
    *{
        box-sizing:border-box;
    }

    body{
        margin:0;
        font-family:Arial, sans-serif;
        background:#f5f5f5;
        display:flex;
        justify-content:center;
       
    }

    .card{
        width:320px;
        text-align:center;
    }

    h1{
        margin:0 0 10px;
        font-size:24px;
    }

    p{
        margin:0 0 16px;
        color:#555;
    }

    a{
        text-decoration:none;
        color:inherit;
    }

    .slider{
        position:relative;
        width:320px;
        height:320px;
        overflow:hidden;
        border-radius:12px;
        box-shadow:0 6px 15px rgba(0,0,0,0.2);
        background:#fff;
    }

    .slide{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        object-fit:cover;
        opacity:0;
        transition:opacity 0.6s ease;
    }

    .slide.active{
        opacity:1;
    }

    .dots{
        margin-top:10px;
        display:flex;
        justify-content:center;
        gap:8px;
    }

    .dot{
        width:10px;
        height:10px;
        border-radius:50%;
        background:#ccc;
        transition:0.3s;
    }

    .dot.active{
        background:#ff5722;
        transform:scale(1.2);
    }
   .close-btn {
  position: absolute;
  top: 0;
  right: 0;
  background: #ff8300;
  color: white;
  border: none;
  width: 30px;
  height: 30px;
  z-index: 0;
  cursor: pointer;
  pointer-events: none;
}
</style>
</body>
</html>
