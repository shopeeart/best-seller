<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Product Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --shopee-orange: #ee4d2d;
      --text-main: #222;
      --text-sub: #666;
      --text-light: #999;
      --border: #f0f0f0;
      --bg: #f5f5f5;
      --white: #fff;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      padding: 12px;
    }

    .phone {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      background: var(--bg);
      overflow: hidden;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .product-page {
      background: var(--bg);
    }

    .gallery {
      position: relative;
      background: #fff;
    }

    .gallery-main {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #fff;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-counter {
      position: absolute;
      right: 10px;
      bottom: 10px;
      padding: 5px 10px;
      font-size: 13px;
      color: #fff;
      background: rgba(0,0,0,0.38);
      border-radius: 16px;
    }

    .section {
      background: var(--white);
      margin-top: 8px;
      padding: 12px;
    }

    .style-text {
      font-size: 15px;
      color: #333;
      margin-bottom: 10px;
    }

    .thumbs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .thumbs::-webkit-scrollbar {
      display: none;
    }

    .thumb {
      width: 58px;
      height: 58px;
      border-radius: 8px;
      border: 1.5px solid #ddd;
      overflow: hidden;
      flex: 0 0 auto;
      background: #fff;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .thumb.active {
      border-color: var(--shopee-orange);
      box-shadow: 0 0 0 1px rgba(238,77,45,0.15);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 8px;
    }

    .price-wrap {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }

    .current-price {
      color: var(--shopee-orange);
      font-weight: 700;
      font-size: 31px;
      line-height: 1;
    }

    .old-price {
      color: #999;
      font-size: 13px;
      text-decoration: line-through;
    }

    .sold-like {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: #666;
      white-space: nowrap;
    }

    .heart-btn {
      border: none;
      background: transparent;
      font-size: 22px;
      cursor: pointer;
      color: #999;
      line-height: 1;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .tag {
      border: 1px solid #ffb3a5;
      color: var(--shopee-orange);
      background: #fff5f2;
      font-size: 12px;
      padding: 4px 7px;
      border-radius: 3px;
      line-height: 1.2;
    }

    .title {
      font-size: 17px;
      line-height: 1.45;
      color: #222;
      font-weight: 500;
    }

    .info-list {
      background: var(--white);
      margin-top: 8px;
    }

    .info-item {
      display: flex;
      gap: 10px;
      padding: 14px 12px;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }

    .info-item:last-child {
      border-bottom: none;
    }

    .info-icon {
      color: var(--shopee-orange);
      font-size: 16px;
      line-height: 1.4;
      margin-top: 1px;
    }

    .info-content {
      flex: 1;
    }

    .info-title {
      font-size: 15px;
      color: #333;
      line-height: 1.4;
    }

    .highlight {
      color: var(--shopee-orange);
    }

    .info-sub {
      margin-top: 4px;
      color: #888;
      font-size: 13px;
      line-height: 1.45;
    }

    .arrow {
      color: #bbb;
      font-size: 18px;
      line-height: 1;
      margin-top: 2px;
    }

    .bottom-bar {
      position: sticky;
      bottom: 0;
      display: flex;
      gap: 10px;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: rgba(255,255,255,0.98);
      border-top: 1px solid #eee;
      backdrop-filter: blur(8px);
    }

    .btn {
      height: 46px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-outline {
      flex: 1;
      background: #fff7f5;
      color: var(--shopee-orange);
      border: 1px solid #ffd0c5;
    }

    .btn-primary {
      flex: 1.2;
      background: linear-gradient(135deg, #ff6a3d, #ee4d2d);
      color: white;
      box-shadow: 0 8px 18px rgba(238, 77, 45, 0.22);
    }
  </style>
</head>
<body>
  <div class="phone">
    <div id="app"></div>
  </div>

  <script>
    const products = [
      {
        Title: "🔥 Bodymist Nước Hoa Nam Nữ EHERB",
        link: "https://vt.tiktok.com/ZS9dGSWL1S1UW-0HEhh/",
        images: [
          "https://p16-oec-sg.ibyteimg.com/tos-alisg-i-aphluv4xwc-sg/c4c1d565f0f645d5b80f57a4cc290062~tplv-aphluv4xwc-resize-webp:800:800.webp?dr=15584&t=555f072d&ps=933b5bde&shp=6ce186a1&shcp=e1be8f53&idc=my&from=1826719393",
          "https://p16-oec-sg.ibyteimg.com/tos-alisg-i-aphluv4xwc-sg/cd4a97ea738b49d4aebf833232d2c2c3~tplv-aphluv4xwc-resize-webp:800:800.webp?dr=15584&t=555f072d&ps=933b5bde&shp=6ce186a1&shcp=e1be8f53&idc=my&from=1826719393",
          "https://p16-oec-sg.ibyteimg.com/tos-alisg-i-aphluv4xwc-sg/cd4a97ea738b49d4aebf833232d2c2c3~tplv-aphluv4xwc-resize-webp:800:800.webp?dr=15584&t=555f072d&ps=933b5bde&shp=6ce186a1&shcp=e1be8f53&idc=my&from=1826719393"
        ]
      }
    ];

    const product = products[0];
    let currentImageIndex = 0;

    function formatPrice(price) {
      return new Intl.NumberFormat("vi-VN").format(price) + "đ";
    }

    function render() {
      const app = document.getElementById("app");

      app.innerHTML = `
        <div class="product-page">
          <div class="gallery">
            <div class="gallery-main" onclick="openProduct()">
              <img id="mainImage" src="${product.images[currentImageIndex]}" alt="${product.Title}">
              <div class="image-counter">
                ${currentImageIndex + 1}/${product.images.length}
              </div>
            </div>
          </div>

          <div class="section">
            <div class="style-text">Phân loại: Mẫu đang chọn</div>

            <div class="thumbs">
              ${product.images.map((img, index) => `
                <div class="thumb ${index === currentImageIndex ? "active" : ""}" onclick="changeImage(${index})">
                  <img src="${img}" alt="thumb-${index + 1}">
                </div>
              `).join("")}
            </div>
          </div>

          <div class="section">
            <div class="price-row">
              <div class="price-wrap">
                <div class="current-price">${formatPrice(658445)}</div>
                <div class="old-price">${formatPrice(799000)}</div>
              </div>

              <div class="sold-like">
                <span>Đã bán 9</span>
                <button class="heart-btn">♡</button>
              </div>
            </div>

            <div class="tag-row">
              <span class="tag">Mua tối thiểu 129.999đ để được giảm 3%</span>
              <span class="tag">Mua 2 giảm 3%</span>
            </div>

            <div class="title">${product.Title}</div>
          </div>

          <div class="info-list">
            <div class="info-item">
              <div class="info-icon">🕒</div>
              <div class="info-content">
                <div class="info-title">
                  <span class="highlight">Hàng đặt trước</span> (có hàng sau 10 ngày) Nhận hàng trong 7 Th04 - 12 Th04
                </div>
                <div class="info-sub">
                  Phí ship 0đ<br>
                  Tặng Voucher 15.000đ nếu đơn giao sau thời gian trên.
                </div>
              </div>
              <div class="arrow">›</div>
            </div>

            <div class="info-item">
              <div class="info-icon">🛡️</div>
              <div class="info-content">
                <div class="info-title">Trả hàng miễn phí 15 ngày</div>
              </div>
              <div class="arrow">›</div>
            </div>
          </div>

          <div class="bottom-bar">
            <button class="btn btn-outline" onclick="copyProductLink()">Sao chép link</button>
            <button class="btn btn-primary" onclick="openProduct()">Mua ngay</button>
          </div>
        </div>
      `;
    }

    function changeImage(index) {
      currentImageIndex = index;
      render();
    }

    function openProduct() {
      window.open(product.link, "_blank");
    }

    function copyProductLink() {
      navigator.clipboard.writeText(product.link)
        .then(() => alert("Đã sao chép link sản phẩm"))
        .catch(() => alert("Không thể sao chép link"));
    }

    render();
  </script>
</body>
</html>
